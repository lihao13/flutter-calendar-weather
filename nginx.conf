server {
    listen 80;
    server_name _;

    # 首页
    location = / {
        root /usr/share/nginx/html/public;
        index index.html;
    }

    # Vue app
    location /vue {
        alias /usr/share/nginx/html/packages/vue-app;
        try_files $uri /packages/vue-app/index.html;
        index index.html;
    }

    # React app
    location /react {
        alias /usr/share/nginx/html/packages/react-app;
        try_files $uri /packages/react-app/index.html;
        index index.html;
    }

    # Angular app
    location /angular {
        alias /usr/share/nginx/html/packages/angular-app;
        try_files $uri /packages/angular-app/index.html;
        index index.html;
    }

    # Original Flutter
    location /flutter {
        alias /usr/share/nginx/html/build/web;
        try_files $uri $uri/ /flutter/index.html;
        index index.html;
    }

    # PHP API
    location ~ ^/api(/.*)$ {
        root /usr/share/nginx/html/packages/backend-php;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    location /api {
        root /usr/share/nginx/html/packages/backend-php;
        index index.html;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control public;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;
}
